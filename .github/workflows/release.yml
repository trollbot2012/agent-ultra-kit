name: release

# Publishes to PyPI via Trusted Publishing (OIDC) — NO API token, no secrets.
# Fires only on a version tag (v*). A manual run (workflow_dispatch) builds and
# checks without publishing, or optionally publishes to TestPyPI.
#
# One-time setup before the first real publish is documented in
# docs/releasing.md (create the PyPI project + trusted publisher, and add a
# required reviewer to the `pypi` environment so a tag push waits for approval).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Manual run target"
        type: choice
        options:
          - none        # build + test + twine check only (dry run)
          - testpypi    # also publish to TestPyPI (needs a TestPyPI trusted publisher)
        default: none

permissions:
  contents: read

jobs:
  build:
    name: build + test + check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build twine
      - name: Run tests
        run: pytest -q
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os, tomllib
          import agent_ultra
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          pyproject = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          init = agent_ultra.__version__
          print(f"tag={tag} pyproject={pyproject} __init__={init}")
          assert tag == pyproject == init, (
              "VERSION MISMATCH — bump pyproject.toml AND src/agent_ultra/"
              "__init__.py to match the tag before tagging (see docs/releasing.md)")
          PY
      - name: Build sdist + wheel
        run: python -m build
      - name: twine check
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: publish to TestPyPI (manual)
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write   # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish to PyPI (tag only)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi     # add a required reviewer here to gate on your approval
    permissions:
      id-token: write   # OIDC token for trusted publishing — no stored secret
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
