name: "Security concern"
description: A NON-sensitive security issue (defaults, docs, hardening ideas)
title: "[security] "
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        > **Do NOT file a public issue for an exploitable vulnerability.**
        >
        > If you found a way to make a DANGEROUS command auto-run without an
        > approver, a secret shape that slips past redaction, or any other
        > exploitable weakness, please report it privately: use GitHub's
        > **Report a vulnerability** button under the Security tab (private
        > advisory), not this form.
        >
        > Use this template only for non-sensitive items: a safer default, a
        > docs clarification, or a hardening suggestion that does not itself
        > describe a live exploit.
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: This is NOT an exploitable vulnerability that should be reported privately.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Command broker (classification / gating / ledger)
        - Secret redaction
        - Proof gates
        - Evidence gathering
        - Default configuration
        - Docs / guidance
        - Other
    validations:
      required: true
  - type: textarea
    id: concern
    attributes:
      label: The concern
      description: What is the weakness or improvement, and what would you change? Do not include a working exploit.
    validations:
      required: true
